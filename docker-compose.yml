networks:
  stray_network:
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - stray_network

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stray}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stray}
      POSTGRES_DB: ${POSTGRES_DB:-stray}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - stray_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stray"]
      interval: 5s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-stray}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-stray}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-my-super-secret-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - stray_network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://stray:stray@postgres:5432/stray
      INFLUX_URL: http://influxdb:8086
      MQTT_BROKER: mosquitto
    ports:
      - "3004:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - stray_network
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_started

  mobile:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3004}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3004/ws}
    ports:
      - "3005:3000"
    networks:
      - stray_network
    depends_on:
      backend:
        condition: service_healthy

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3004}
    ports:
      - "3006:3001"
    networks:
      - stray_network
    depends_on:
      backend:
        condition: service_healthy

  detector:
    build:
      context: ./services/detector
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      YOLO_MODEL: yolo26/yolo26l.pt
    ports:
      - "3008:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "10", "http://localhost:8001/health"]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 60s
    networks:
      - stray_network

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_DETECTOR_URL: ${NEXT_PUBLIC_DETECTOR_URL:-http://localhost:3008}
      # In production set this to wss://api.heretichydra.xyz/ws so the browser
      # WebSocket goes through the Cloudflare tunnel instead of localhost.
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3004/ws}
    ports:
      - "3007:3002"
    networks:
      - stray_network
    depends_on:
      backend:
        condition: service_healthy
      detector:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    network_mode: host
    depends_on:
      - admin
      - mobile
      - landing
