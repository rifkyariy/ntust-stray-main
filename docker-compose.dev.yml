services:
  mosquitto:
    volumes:
      - ./mosquitto/mosquitto.dev.conf:/mosquitto/config/mosquitto.conf:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mobile:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile.dev
    volumes:
      - ./apps/mobile:/app/apps/mobile
      - ./packages/ui:/app/packages/ui
      - /app/node_modules
      - /app/apps/mobile/node_modules
      - /app/packages/ui/node_modules
    command: pnpm --filter @stray/mobile dev

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile.dev
    volumes:
      - ./apps/landing:/app/apps/landing
      - ./packages/ui:/app/packages/ui
      - /app/node_modules
      - /app/apps/landing/node_modules
      - /app/packages/ui/node_modules
    command: pnpm --filter @stray/landing dev

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages/ui:/app/packages/ui
      - /app/node_modules
      - /app/apps/admin/node_modules
      - /app/packages/ui/node_modules
    environment:
      NEXT_PUBLIC_DETECTOR_URL: ${NEXT_PUBLIC_DETECTOR_URL:-http://localhost:8001}
    command: pnpm --filter @stray/admin dev

  cloudflared:
    profiles: ["tunnel"]  # only starts when: docker compose --profile tunnel up

  detector:
    build:
      context: ./services/detector
      dockerfile: Dockerfile
    environment:
      DEMO_VIDEO_PATH: /data/video/dummy.mp4
      DEMO_CACHE_DIR: /data/cache
    volumes:
      - ./services/detector/app:/app/app
      - ./apps/admin/public/video:/data/video:ro
      - ./services/detector/cache:/data/cache
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"

  influxdb:
    ports:
      - "8086:8086"
